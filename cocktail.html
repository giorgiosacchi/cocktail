<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocktail Manager - Giorgio</title>
    <style>
        :root {
            --primary: #c0392b;
            --secondary: #2980b9;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }

        .container {
            background-color: white;
            color: #333;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 1.5rem;
        }

        h3 {
            border-bottom: 2px solid var(--light);
            padding-bottom: 5px;
            margin-top: 2rem;
            color: var(--dark);
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
        }

        /* Stile per le liste a tendina */
        .dropdown-list {
            display: none;
            position: absolute;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        .dropdown-list .option {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .dropdown-list .option:hover {
            background-color: #f0f0f0;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
            color: white;
        }

        .btn-ingr { background-color: var(--primary); }
        .btn-prep { background-color: #27ae60; }
        .btn-search { background-color: var(--secondary); width: 100%; margin-top: 10px;}

        button:hover { opacity: 0.9; }

        /* Stile per le Modali */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 2000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.7); 
        }

        .modal-content {
            background-color: #fefefe;
            margin: 10% auto; 
            padding: 20px;
            border: 1px solid #888;
            width: 90%; 
            max-width: 500px;
            border-radius: 10px;
            color: #333;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover { color: black; }

        ul { list-style-type: none; padding: 0; }
        li { padding: 8px 0; border-bottom: 1px solid #eee; }
        
        .result-item {
            padding: 10px;
            background: #f9f9f9;
            margin-bottom: 5px;
            border-radius: 4px;
            cursor: pointer;
        }
        .result-item:hover {
            background: #eef;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍸 Cocktail Manager</h1>

    <!-- SEZIONE 1: RICERCA PER INGREDIENTE -->
    <h3>Cerca per Ingrediente</h3>
    <div class="form-group">
        <label for="ingredientInput">Seleziona Ingrediente:</label>
        <input type="text" id="ingredientInput" placeholder="Clicca o scrivi (es. Gin, Rum)..." autocomplete="off">
        <div id="ingredientDropdown" class="dropdown-list"></div>
    </div>
    <button class="btn-search" onclick="searchByIngredient()">Trova Cocktail con questo ingrediente</button>

    <!-- SEZIONE 2: SCELTA COCKTAIL -->
    <h3>Preparazione Cocktail</h3>
    <div class="form-group">
        <label for="cocktailInput">Scegli Cocktail:</label>
        <input type="text" id="cocktailInput" placeholder="Clicca per vedere la lista o cerca..." autocomplete="off">
        <div id="cocktailDropdown" class="dropdown-list"></div>
    </div>

    <div class="form-group">
        <label for="peopleCount">Per quante persone?</label>
        <input type="number" id="peopleCount" min="1" value="1">
    </div>

    <div class="btn-group">
        <button class="btn-ingr" onclick="showIngredients()">Vedi Ingredienti</button>
        <button class="btn-prep" onclick="showPreparation()">Vedi Preparazione</button>
    </div>
</div>

<!-- Modale Ingredienti Cocktail -->
<div id="modalIngredients" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('modalIngredients')">&times;</span>
        <h2 id="ingrTitle">Ingredienti</h2>
        <ul id="ingrList"></ul>
    </div>
</div>

<!-- Modale Preparazione Cocktail -->
<div id="modalPreparation" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('modalPreparation')">&times;</span>
        <h2 id="prepTitle">Preparazione</h2>
        <p id="prepText"></p>
    </div>
</div>

<!-- Modale Risultati Ricerca per Ingrediente -->
<div id="modalIngredientSearch" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal('modalIngredientSearch')">&times;</span>
        <h2 id="searchTitle">Cocktail trovati</h2>
        <p id="searchSubtitle"></p>
        <div id="searchResults"></div>
    </div>
</div>

    ];

    // --- FUNZIONE PER CREARE DROPDOWN ---
    function createDropdown(inputId, dropdownId, options, onSelect) {
        const input = document.getElementById(inputId);
        const dropdown = document.getElementById(dropdownId);
        let selectedIndex = -1;

        function renderList(filterText = "") {
            dropdown.innerHTML = "";
            selectedIndex = -1;
            
            const filtered = options.filter(opt => 
                opt.toLowerCase().includes(filterText.toLowerCase())
            );

            if (filtered.length === 0) {
                const div = document.createElement('div');
                div.className = 'option';
                div.innerText = "Nessun risultato";
                div.style.color = "#999";
                dropdown.appendChild(div);
            } else {
                filtered.forEach((opt, index) => {
                    const div = document.createElement('div');
                    div.className = 'option';
                    div.innerText = opt;
                    div.dataset.index = index;
                    div.addEventListener('click', function(e) {
                        e.stopPropagation();
                        onSelect(opt);
                        input.value = opt;
                        dropdown.style.display = "none";
                    });
                    dropdown.appendChild(div);
                });
            }
            dropdown.style.display = "block";
        }

        // Click sull'input
        input.addEventListener('click', function(e) {
            e.stopPropagation();
            renderList(input.value);
        });

        // Input typing
        input.addEventListener('input', function() {
            renderList(input.value);
        });

        // Focus
        input.addEventListener('focus', function() {
            renderList(input.value);
        });

        return renderList;
    }

    // --- INIZIALIZZAZIONE DROPDOWN ---
    
    // 1. Cocktail Dropdown
    const cocktailNames = cocktailsDB.map(c => c.name);
    createDropdown('cocktailInput', 'cocktailDropdown', cocktailNames, function(name) {
        // Selezione cocktail
    });

    // 2. Ingredienti Dropdown (estrai ingredienti unici)
    const uniqueIngredients = new Set();
    cocktailsDB.forEach(c => {
        c.ingredients.forEach(ing => {
            const name = ing.split(':')[0].trim();
            const cleanName = name.replace(/\d+/g, '').trim();
            if(cleanName.length > 2) uniqueIngredients.add(cleanName);
        });
    });
    const ingredientList = Array.from(uniqueIngredients).sort();
    createDropdown('ingredientInput', 'ingredientDropdown', ingredientList, function(name) {
        // Selezione ingrediente
    });

    // --- CHIUDI DROPDOWN CLICCANDO FUORI ---
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.form-group')) {
            document.getElementById('cocktailDropdown').style.display = "none";
            document.getElementById('ingredientDropdown').style.display = "none";
        }
    });

    // --- FUNZIONI COCKTAIL ---

    function getCocktailData(name) {
        return cocktailsDB.find(c => c.name === name);
    }

    function showIngredients() {
        const name = document.getElementById('cocktailInput').value.trim();
        const people = parseInt(document.getElementById('peopleCount').value) || 1;
        const cocktail = getCocktailData(name);

        if (!cocktail) {
            alert("Per favore seleziona un cocktail valido dalla lista.");
            return;
        }

        const listContainer = document.getElementById('ingrList');
        document.getElementById('ingrTitle').innerText = `Ingredienti per ${people} persone: ${cocktail.name}`;
        listContainer.innerHTML = '';

        cocktail.ingredients.forEach(ingr => {
            const li = document.createElement('li');
            const regex = /(\d+(\.\d+)?)/g;
            const newIngr = ingr.replace(regex, (match) => {
                return (parseFloat(match) * people).toFixed(1).replace(/\.0$/, ''); 
            });
            li.innerText = newIngr;
            listContainer.appendChild(li);
        });

        document.getElementById('modalIngredients').style.display = "block";
    }

    function showPreparation() {
        const name = document.getElementById('cocktailInput').value.trim();
        const cocktail = getCocktailData(name);

        if (!cocktail) {
            alert("Per favore seleziona un cocktail valido dalla lista.");
            return;
        }

        document.getElementById('prepTitle').innerText = `Preparazione: ${cocktail.name}`;
        document.getElementById('prepText').innerText = cocktail.prep;
        document.getElementById('modalPreparation').style.display = "block";
    }

    // --- RICERCA PER INGREDIENTE ---

    function searchByIngredient() {
        const ingredient = document.getElementById('ingredientInput').value.trim();
        if (!ingredient) {
            alert("Seleziona o scrivi un ingrediente.");
            return;
        }

        const resultsDiv = document.getElementById('searchResults');
        resultsDiv.innerHTML = "";
        
        const foundCocktails = cocktailsDB.filter(c => {
            return c.ingredients.some(ing => ing.toLowerCase().includes(ingredient.toLowerCase()));
        });

        document.getElementById('searchTitle').innerText = `Risultati per: ${ingredient}`;
        document.getElementById('searchSubtitle').innerText = `${foundCocktails.length} cocktail trovati`;

        if (foundCocktails.length === 0) {
            resultsDiv.innerHTML = "<p>Nessun cocktail trovato con questo ingrediente.</p>";
        } else {
            foundCocktails.forEach(c => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerText = c.name;
                div.onclick = function() {
                    document.getElementById('cocktailInput').value = c.name;
                    document.getElementById('cocktailDropdown').style.display = "none";
                    closeModal('modalIngredientSearch');
                };
                resultsDiv.appendChild(div);
            });
        }

        document.getElementById('modalIngredientSearch').style.display = "block";
    }

    // --- CHIUDI MODALI ---
    function closeModal(modalId) {
        document.getElementById(modalId).style.display = "none";
    }

    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = "none";
        }
    }
</script>
